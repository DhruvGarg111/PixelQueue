global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: ml_service
    metrics_path: /metrics
    static_configs:
      - targets:
          - ml-service:8002

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:9101
