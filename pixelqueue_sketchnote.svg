<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" width="900" height="900">
<defs>
<style>
@import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&amp;display=swap');
.t{font-family:'Patrick Hand',cursive;fill:#222}
.h1{font-size:56px;font-weight:bold}
.h2{font-size:22px}
.h3{font-size:30px;font-weight:bold}
.body{font-size:20px;fill:#444}
.sm{font-size:16px;fill:#666}
.lbl{font-size:15px;fill:#555}
.ink{fill:none;stroke:#333;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.ink2{fill:none;stroke:#333;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.arrow{fill:none;stroke:#555;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
<marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
<filter id="sh"><feDropShadow dx="2" dy="3" stdDeviation="2.5" flood-opacity=".08"/></filter>
</defs>

<!-- BG -->
<rect width="900" height="900" fill="#FAF6EF"/>

<!-- ===== TITLE ===== -->
<g transform="translate(40,55)">
<path d="M-5 10 Q120 4 310 12" stroke="#FDE68A" stroke-width="20" fill="none" stroke-linecap="round" opacity=".85"/>
<text class="t h1" y="18">PIXEL QUEUE</text>
<text class="t h2" y="52">Vision Intelligence Infrastructure</text>
<path d="M0 62 Q80 58 220 64" class="ink2" stroke="#bbb"/>
</g>

<!-- ===== ZERO-DEFECT BANNER ===== -->
<g transform="translate(590,22)">
<path d="M0 30 Q40 0 120 12 Q130 14 128 30 Q126 50 80 48 Q20 52 0 30Z" fill="#D5F5E3" stroke="#4ade80" stroke-width="2"/>
<text class="t" style="font-size:18px" x="18" y="36">Zero-Defect!</text>
</g>
<!-- Exclamation doodles -->
<text class="t" style="font-size:28px;fill:#f59e0b" x="730" y="30">‼</text>

<!-- ===== 1. PERSONAS (top-left) ===== -->
<g transform="translate(40,120)" filter="url(#sh)">
<rect x="0" y="0" width="310" height="150" rx="16" fill="#DBEAFE" stroke="#60a5fa" stroke-width="2.5"/>
<text class="t h3" x="20" y="38">PERSONAS</text>
<path d="M20 48 L160 48" class="ink2"/>

<!-- Admin stick figure + crown -->
<g transform="translate(45,95)">
<circle cx="0" cy="-18" r="12" class="ink" fill="#fff"/>
<path d="M0 -6 L0 18 M-14 6 L0 0 L14 6 M-8 18 L0 30 M8 18 L0 30" class="ink2"/>
<!-- crown -->
<path d="M-10 -34 L-6 -26 L0 -34 L6 -26 L10 -34 L10 -28 L-10 -28Z" fill="#FBBF24" stroke="#d97706" stroke-width="1.5"/>
<text class="t body" text-anchor="middle" y="48">Admin</text>
</g>

<!-- Reviewer stick figure + magnifier -->
<g transform="translate(155,95)">
<circle cx="0" cy="-18" r="12" class="ink" fill="#fff"/>
<path d="M0 -6 L0 18 M-14 6 L0 0 L14 6 M-8 18 L0 30 M8 18 L0 30" class="ink2"/>
<!-- magnifier -->
<circle cx="14" cy="-34" r="7" fill="none" stroke="#555" stroke-width="2"/>
<path d="M19 -28 L26 -20" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
<text class="t body" text-anchor="middle" y="48">Reviewer</text>
</g>

<!-- Annotator stick figure + pencil -->
<g transform="translate(265,95)">
<circle cx="0" cy="-18" r="12" class="ink" fill="#fff"/>
<path d="M0 -6 L0 18 M-14 6 L0 0 L14 6 M-8 18 L0 30 M8 18 L0 30" class="ink2"/>
<!-- pencil -->
<path d="M10 -40 L18 -24 L14 -22 L6 -38Z" fill="#FBBF24" stroke="#555" stroke-width="1.5"/>
<path d="M14 -22 L16 -18" stroke="#555" stroke-width="1.5"/>
<text class="t body" text-anchor="middle" y="48">Annotator</text>
</g>
</g>

<!-- Small check marks -->
<text style="font-size:22px" x="360" y="175">✓</text>

<!-- ===== 2. DATA LAYER (top-right cloud) ===== -->
<g transform="translate(500,100)" filter="url(#sh)">
<!-- Cloud shape -->
<path d="M40 130 Q-20 130 -10 90 Q-25 60 15 50 Q10 10 60 8 Q100 -10 150 10 Q200 0 220 30 Q260 25 265 60 Q290 75 270 100 Q280 135 240 140 Z" fill="#FCE4EC" stroke="#ec4899" stroke-width="2.5"/>
<text class="t h3" x="55" y="48">DATA LAYER</text>

<!-- DB cylinder -->
<g transform="translate(50,65)">
<ellipse cx="28" cy="8" rx="22" ry="8" fill="#fff" stroke="#555" stroke-width="2"/>
<path d="M6 8 L6 40 M50 8 L50 40" stroke="#555" stroke-width="2"/>
<ellipse cx="28" cy="40" rx="22" ry="8" fill="#fff" stroke="#555" stroke-width="2"/>
<path d="M6 24 A22 8 0 0 0 50 24" fill="none" stroke="#555" stroke-width="1.5"/>
<text class="t sm" text-anchor="middle" x="28" y="68">PostgreSQL</text>
</g>

<!-- Bucket icon -->
<g transform="translate(175,65)">
<path d="M5 5 L45 5 L40 40 L10 40Z" fill="#fff" stroke="#555" stroke-width="2" stroke-linejoin="round"/>
<path d="M5 5 L45 5" stroke="#555" stroke-width="2.5"/>
<path d="M15 15 L35 15" stroke="#aaa" stroke-width="1.5"/>
<text class="t sm" text-anchor="middle" x="25" y="60">MinIO</text>
<text class="t" style="font-size:14px;fill:#888" text-anchor="middle" x="25" y="76">(S3)</text>
</g>
</g>

<!-- ===== 3. CORE UI (mid-left) ===== -->
<g transform="translate(40,340)" filter="url(#sh)">
<!-- Browser window -->
<rect x="0" y="0" width="220" height="190" rx="12" fill="#FFEDD5" stroke="#f97316" stroke-width="2.5"/>
<!-- Title bar -->
<rect x="0" y="0" width="220" height="30" rx="12" fill="#FED7AA" stroke="none"/>
<rect x="0" y="18" width="220" height="12" fill="#FED7AA" stroke="none"/>
<circle cx="20" cy="15" r="5" fill="#ef4444"/>
<circle cx="36" cy="15" r="5" fill="#eab308"/>
<circle cx="52" cy="15" r="5" fill="#22c55e"/>

<text class="t h3" x="18" y="62">CORE UI</text>
<text class="t body" x="18" y="90">React</text>
<text class="t body" x="18" y="115">+ Vite</text>

<!-- Canvas doodle -->
<g transform="translate(120,65)">
<rect x="0" y="0" width="70" height="55" rx="4" fill="#fff" stroke="#555" stroke-width="2"/>
<!-- Bounding box -->
<rect x="15" y="10" width="35" height="28" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="4 3"/>
<!-- Corner handles -->
<rect x="12" y="7" width="6" height="6" fill="#f97316"/>
<rect x="47" y="7" width="6" height="6" fill="#f97316"/>
<rect x="12" y="35" width="6" height="6" fill="#f97316"/>
<rect x="47" y="35" width="6" height="6" fill="#f97316"/>
<!-- Simple object inside -->
<circle cx="32" cy="24" r="8" fill="#FDE68A" stroke="#555" stroke-width="1.5"/>
</g>

<text class="t sm" x="18" y="155">Canvas Renderer</text>
<text class="t sm" x="18" y="175">OLED Dark Theme</text>
</g>

<!-- ===== 4. API GATEWAY (center) ===== -->
<g transform="translate(340,340)" filter="url(#sh)">
<!-- Hexagon -->
<polygon points="110,0 210,55 210,155 110,210 10,155 10,55" fill="#EDE9FE" stroke="#a855f7" stroke-width="2.5"/>

<text class="t h3" x="50" y="60">API</text>
<text class="t h3" x="30" y="90">GATEWAY</text>

<!-- Lightning bolt -->
<path d="M165 42 L155 68 L170 68 L158 98" fill="none" stroke="#eab308" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

<text class="t body" x="35" y="125">NGINX → FastAPI</text>
<text class="t sm" x="42" y="155">REST / WebSocket</text>
</g>

<!-- ===== 5. ML WORKERS (bottom-right) ===== -->
<g transform="translate(580,560)" filter="url(#sh)">
<rect x="0" y="0" width="280" height="200" rx="18" fill="#D1FAE5" stroke="#34d399" stroke-width="2.5"/>
<text class="t h3" x="22" y="42">ML WORKERS</text>
<path d="M22 52 L200 52" class="ink2"/>

<text class="t body" x="22" y="82">Celery + Redis</text>

<!-- Gear icons -->
<g transform="translate(210,30)">
<circle cx="0" cy="0" r="14" fill="#fff" stroke="#555" stroke-width="2"/>
<circle cx="0" cy="0" r="5" fill="#555"/>
<path d="M0 -14 L0 -19 M0 14 L0 19 M-14 0 L-19 0 M14 0 L19 0" stroke="#555" stroke-width="2.5"/>
<path d="M-10 -10 L-13 -13 M10 10 L13 13 M10 -10 L13 -13 M-10 10 L-13 13" stroke="#555" stroke-width="2"/>
</g>
<g transform="translate(245,55)">
<circle cx="0" cy="0" r="10" fill="#fff" stroke="#555" stroke-width="1.5"/>
<circle cx="0" cy="0" r="4" fill="#555"/>
<path d="M0 -10 L0 -14 M0 10 L0 14 M-10 0 L-14 0 M10 0 L14 0" stroke="#555" stroke-width="2"/>
</g>

<!-- Brain icon -->
<g transform="translate(30,115)">
<path d="M0 0 Q-5 -15 8 -20 Q15 -28 25 -18 Q35 -28 40 -15 Q50 -10 45 0 Q50 12 40 18 Q35 28 25 22 Q15 30 8 20 Q-5 15 0 0Z" fill="#fff" stroke="#555" stroke-width="2"/>
<path d="M25 -18 L25 22 M12 -10 Q25 0 12 12 M38 -10 Q25 0 38 12" fill="none" stroke="#555" stroke-width="1.5"/>
</g>
<text class="t body" x="85" y="125">YOLO / SAM</text>
<text class="t body" x="85" y="150">Auto-Label</text>

<!-- Progress bar -->
<rect x="22" y="168" width="180" height="14" rx="7" fill="#fff" stroke="#555" stroke-width="1.5"/>
<rect x="24" y="170" width="120" height="10" rx="5" fill="#34d399"/>
</g>

<!-- ===== 6. EXPORT ENGINE (bottom-left) ===== -->
<g transform="translate(40,620)" filter="url(#sh)">
<!-- Tilted sticky note -->
<rect x="0" y="0" width="220" height="170" rx="6" fill="#FEF9C3" stroke="#eab308" stroke-width="2.5" transform="rotate(-3 110 85)"/>
<text class="t h3" x="15" y="40">EXPORT ENGINE</text>
<path d="M15 50 L180 48" class="ink2"/>

<!-- file icon 1 -->
<g transform="translate(20,65)">
<path d="M0 0 L28 0 L35 8 L35 35 L0 35Z" fill="#fff" stroke="#555" stroke-width="2"/>
<path d="M28 0 L28 8 L35 8" fill="none" stroke="#555" stroke-width="1.5"/>
<text class="t" style="font-size:10px;fill:#888" x="5" y="24">COCO</text>
<text class="t" style="font-size:9px;fill:#888" x="7" y="33">JSON</text>
</g>
<text class="t body" x="65" y="95">COCO JSON</text>

<!-- file icon 2 -->
<g transform="translate(20,115)">
<path d="M0 0 L28 0 L35 8 L35 35 L0 35Z" fill="#fff" stroke="#555" stroke-width="2"/>
<path d="M28 0 L28 8 L35 8" fill="none" stroke="#555" stroke-width="1.5"/>
<text class="t" style="font-size:10px;fill:#888" x="5" y="24">YOLO</text>
<text class="t" style="font-size:9px;fill:#888" x="10" y="33">txt</text>
</g>
<text class="t body" x="65" y="145">YOLO txt</text>
</g>

<!-- ===== CONNECTIONS / ARROWS ===== -->
<!-- Personas → Core UI (down) -->
<path d="M150 275 Q145 310 130 335" class="arrow" marker-end="url(#ah)"/>

<!-- Core UI → API Gateway (HTTP/WSS) -->
<path d="M262 420 Q300 390 340 400" class="arrow" marker-end="url(#ah)"/>
<text class="t lbl" x="268" y="388">HTTP/WSS</text>

<!-- API Gateway → Core UI (Dispatch, back arrow) -->
<path d="M345 480 Q300 500 260 490" class="arrow" marker-end="url(#ah)"/>
<text class="t lbl" x="272" y="510">Dispatch</text>

<!-- API Gateway → Data Layer (Read/Write) -->
<path d="M520 380 Q600 320 640 260" class="arrow" marker-end="url(#ah)"/>
<text class="t lbl" x="580" y="310">Read/</text>
<text class="t lbl" x="580" y="326">Write</text>

<!-- API Gateway → ML Workers (Pub/Sub) -->
<path d="M530 490 Q600 540 610 560" class="arrow" marker-end="url(#ah)"/>
<text class="t lbl" x="555" y="530">Pub/Sub</text>

<!-- Export Engine → Human-in-the-Loop circle back to Personas -->
<g transform="translate(310,680)">
<circle cx="0" cy="0" r="20" fill="none" stroke="#555" stroke-width="2"/>
<!-- Circular arrow -->
<path d="M-18 -8 A20 20 0 1 1 -8 -18" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#ah)"/>
<!-- Person silhouette inside -->
<circle cx="0" cy="-5" r="5" fill="#555"/>
<path d="M-8 12 Q0 2 8 12" fill="#555"/>
</g>
<text class="t sm" x="280" y="720">Human-in-the-Loop</text>

<!-- Check marks scattered -->
<text style="font-size:20px;fill:#22c55e" x="270" y="300">✓</text>
<text style="font-size:20px;fill:#22c55e" x="310" y="575">✓</text>
<text style="font-size:20px;fill:#22c55e" x="100" y="610">✓</text>

<!-- Exclamation doodles near workers -->
<text class="t" style="font-size:26px;fill:#f59e0b" x="845" y="570">‼</text>

</svg>
